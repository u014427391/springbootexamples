spring:
  application:
    name: springboot-ai-mcp
  ai:
    openai:
      api-key: your-api-key
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
          temperature: 0.7
    mcp:
      server:
        name: "天气预报 MCP 插件"
        version: "1.0.0"
        stdio: true  # 启用 Stdio 传输模式
