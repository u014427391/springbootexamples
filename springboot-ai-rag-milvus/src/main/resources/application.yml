spring:
  application:
    name: springboot-ai-rag-milvus
  ai:
    openai:
      api-key: your-api-key
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
          temperature: 0.7
      embedding:
        options:
          model: Qwen/Qwen3-Embedding-8B


    # Milvus配置
    vectorstore:
      milvus:
        client:
          host: 127.0.0.1
          port: 19530
          username: root
          password: Milvus
        database-name: default
        collection-name: "vector_store"  # Collection名称
        embedding-dimension: 4096       # 与Embedding模型维度一致
        index-type: IVF_FLAT            # 索引类型
        metric-type: COSINE             # 距离度量类型
        initialize-schema: true         # 允许自动初始化Schema

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB